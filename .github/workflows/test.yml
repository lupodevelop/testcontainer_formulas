name: test

# This workflow assumes the core `testcontainer` package is either:
#   1. Published on Hex (and gleam.toml uses a version range), or
#   2. Available as a sibling checkout at `../testcontiner` (current
#      path dep). The "Checkout core sibling" step below covers case 2;
#      drop it once gleam.toml switches to a Hex range.

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: testcontainers_formulas
      - name: Checkout core sibling
        uses: actions/checkout@v4
        with:
          repository: lupodevelop/testcontiner
          path: testcontiner
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          gleam-version: "1.14.0"
          rebar3-version: "3"
      - working-directory: testcontainers_formulas
        run: gleam deps download
      - working-directory: testcontainers_formulas
        run: gleam test
      - working-directory: testcontainers_formulas
        run: gleam format --check src test

  integration:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
        with:
          path: testcontainers_formulas
      - name: Checkout core sibling
        uses: actions/checkout@v4
        with:
          repository: lupodevelop/testcontiner
          path: testcontiner
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          gleam-version: "1.14.0"
          rebar3-version: "3"
      - name: Verify Docker is available
        run: docker version
      - working-directory: testcontainers_formulas
        run: gleam deps download
      - name: Run integration tests
        working-directory: testcontainers_formulas
        env:
          TESTCONTAINER_FORMULAS_INTEGRATION: "true"
        run: gleam test
